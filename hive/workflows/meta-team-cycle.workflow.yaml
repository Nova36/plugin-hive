name: meta-team-cycle
description: >
  Meta Team nightly optimization cycle — autonomous self-improvement pipeline.
  8-phase cycle: boot, analysis, proposal, implementation, testing, evaluation,
  promotion, close. 5-agent pipeline within a 5-hour budget window.
version: "1.0.0"
methodology: meta-team

# ENFORCEMENT RULES:
# 1. Boot MUST acquire cycle lock before any other phase runs
# 2. Budget enforcement at every phase boundary: <90 min remaining → skip to close
# 3. Analysis is the only phase in the baseline cycle (S3) — phases 3-7 are stubbed
# 4. Independent evaluation: architect (proposer) != reviewer (evaluator)
# 5. All changes validated in sandbox worktree before promotion
# 6. Subjective changes deferred with needs-user-review tag, never auto-promoted
# 7. One worktree per proposal — never shared between concurrent proposals
#
# SCHEDULING:
# - CronCreate: "3 3 * * *" (3:03 AM CST nightly), durable mode
# - Re-register on interactive session start (mitigate 7-day expiry)
# - Manual trigger supported for testing (S3 baseline cycle)
#
# STATE FILES (all at state/meta-team/):
# - cycle-state.yaml — cycle progress + concurrent lock
# - ledger.yaml — optimization outcomes log
# - queue.yaml — prioritized optimization targets
# - analysis-cache.yaml — cached findings with TTL
# - charter.md — read-only operating constraints
#
# BUDGET:
# - Total: 300 minutes (5 hours)
# - Phase-skip threshold: 90 minutes
# - Proposals per cycle: 1-3

steps:
  - id: boot
    phase: 1
    agent: orchestrator
    step_file: workflows/steps/meta-team-cycle/step-01-boot.md
    task: >
      Acquire cycle lock, load all state files, prune expired analysis-cache
      entries, detect interrupted cycles, create baseline git tag.

  - id: analysis
    phase: 2
    agent: researcher
    step_file: workflows/steps/meta-team-cycle/step-02-analysis.md
    task: >
      Scan Hive internals for optimization targets. Check personas, skills,
      workflows, gate policies. Deduplicate against ledger. Output prioritized
      targets to queue. Extensions: external research (S6), memory targeting (S7).

  - id: proposal
    phase: 3
    agent: architect
    step_file: workflows/steps/meta-team-cycle/step-03-proposal.md
    task: >
      Read top N targets from queue (N=1-3 based on budget). Produce structured
      proposals with target file, change type, description, rationale, expected
      impact, and rollback plan. (Stubbed in baseline cycle.)

  - id: implementation
    phase: 4
    agent: developer
    step_file: workflows/steps/meta-team-cycle/step-04-implementation.md
    task: >
      Create worktree per proposal. Implement actual file edits from architect's
      proposal. Do not redesign or expand scope. (Stubbed in baseline cycle.)

  - id: testing
    phase: 5
    agent: tester
    step_file: workflows/steps/meta-team-cycle/step-05-testing.md
    task: >
      Run sandbox validation suite per worktree: destructiveness check, structural
      validation, heuristic analysis. Output pass/fail with metrics.
      (Stubbed in baseline cycle.)

  - id: evaluation
    phase: 6
    agent: reviewer
    step_file: workflows/steps/meta-team-cycle/step-06-evaluation.md
    task: >
      Independently evaluate each proposal. See tester metrics and diff only (not
      architect's rationale). Verdict: keep, discard, or defer.
      (Stubbed in baseline cycle.)

  - id: promotion
    phase: 7
    agent: orchestrator
    step_file: workflows/steps/meta-team-cycle/step-07-promotion.md
    task: >
      Cherry-pick kept changes to main. Save deferred changes as patch files.
      Clean up all worktrees. (Stubbed in baseline cycle.)

  - id: close
    phase: 8
    agent: orchestrator
    step_file: workflows/steps/meta-team-cycle/step-08-close.md
    task: >
      Write ledger entries, update queue, prune old ledger entries, generate
      morning summary, release cycle lock, clean exit.
