id: wire-daily-ceremony
epic: hive-phase11
title: Wire Linear operations into daily ceremony workflow
status: pending
complexity: medium
depends_on: [linear-integration-reference, linear-commands-quickref]

description: |
  Update daily-ceremony.workflow.yaml so each phase description includes the
  specific Linear operations it must perform. This makes Linear a first-class
  part of the ceremony, not an afterthought.

acceptance_criteria:
  - "Given the standup phase, then it explicitly queries Linear board and surfaces blockers"
  - "Given the planning phase, then it creates epic parent and story sub-issues in Linear"
  - "Given the execution phase, then it claims tickets with assignment locking"
  - "Given the test-handoff phase, then it moves tickets to In Review"
  - "Given the fix-loop phase, then it creates bug sub-issues for test failures"
  - "Given the session-end phase, then it unassigns completed tickets"

steps:
  - id: update-workflow
    description: |
      Update skills/hive/workflows/daily-ceremony.workflow.yaml:

      Each phase description gets a "Linear operations" subsection with:
      - What linearis commands to run
      - How to update cycle state with Linear ticket IDs
      - Error handling (what if linearis fails)

      Reference linear-commands.md for the exact commands rather than
      inlining them all (keeps the workflow readable).
    agent: developer

context:
  codebase: /Users/don/Documents/plugin-hive
  key_files:
    - skills/hive/workflows/daily-ceremony.workflow.yaml — workflow to update
    - skills/hive/references/linear-commands.md — commands to reference
    - skills/hive/references/linear-integration.md — full integration spec

files_to_modify:
  - file: skills/hive/workflows/daily-ceremony.workflow.yaml
    change: Add Linear operations to each phase description
