id: linear-integration-reference
epic: hive-phase11
title: Create Linear integration reference with per-phase commands
status: pending
complexity: medium
depends_on: [expand-task-tracking-adapter]

description: |
  Create a comprehensive reference doc that maps every daily ceremony phase
  to its concrete Linear operations. This is the authoritative guide for how
  the orchestrator and agents interact with Linear throughout the workflow.

acceptance_criteria:
  - "Given each ceremony phase, then the doc specifies exact linearis CLI commands to run"
  - "Given the standup phase, then the doc shows how to query and format the board view"
  - "Given the execution phase, then the doc shows the claim/lock protocol"
  - "Given the GitHub integration, then setup steps are documented"

steps:
  - id: create-reference
    description: |
      Create skills/hive/references/linear-integration.md with sections:

      1. Overview — Linear as the project board for Hive workflows
      2. Board Design — statuses, labels, hierarchy, branch convention
      3. Per-Phase Operations:
         - Standup: query board, surface blockers, show resolved items
         - Planning: create epic parent, create story sub-issues, set Todo
         - Execution: claim (assign + In Progress), create branch
         - Commit: reference ticket in commit message (HOM-{N})
         - Test Handoff: move to In Review
         - Fix Loop: create bug sub-issues, close fixed bugs
         - Final Review: no Linear action (code review only)
         - Push: branch name triggers GitHub auto-link, merge auto-closes
         - Session End: unassign completed, surface blocked
      4. Assignment Locking Protocol
      5. GitHub Integration Setup (manual steps)
      6. Standup Board View Format
    agent: developer

context:
  codebase: /Users/don/Documents/plugin-hive
  key_files:
    - skills/hive/references/task-tracking-adapter.md — adapter operations
    - skills/hive/workflows/daily-ceremony.workflow.yaml — ceremony phases

files_to_modify:
  - file: skills/hive/references/linear-integration.md
    change: NEW FILE — comprehensive Linear integration reference

references:
  - skills/hive/references/task-tracking-adapter.md
  - skills/hive/workflows/daily-ceremony.workflow.yaml
