id: expand-task-tracking-adapter
epic: hive-phase11
title: Rewrite task tracking adapter for full ticket lifecycle
status: pending
complexity: medium
depends_on: [linear-board-setup]

description: |
  Rewrite task-tracking-adapter.md from human-intervention-only to full lifecycle
  management. Add operations for the complete ticket flow: create epic parents,
  create story/bug sub-issues, claim with assignment lock, release, query the
  board, and transition statuses.

  Also document the branch naming convention (hom-{N}-{slug}) that enables
  Linear's native GitHub auto-linking.

acceptance_criteria:
  - "Given the adapter, then it supports: createEpicParent, createStoryIssue, createBugIssue, claimIssue, releaseIssue, updateStatus, queryBoard, readIssue"
  - "Given claimIssue, then it checks assignee first (lock check) before assigning"
  - "Given the branch naming convention, then it's documented with the HOM-{N} pattern"
  - "Given the Linear status flow, then it maps: Backlog→Todo→In Progress→In Review→Done"

steps:
  - id: rewrite-adapter
    description: |
      Rewrite skills/hive/references/task-tracking-adapter.md:

      1. Keep the adapter interface table but expand operations:
         - createEpicParent(title, description) → creates parent issue with epic-parent label
         - createStoryIssue(title, description, parentId) → creates sub-issue with story label
         - createBugIssue(title, description, parentStoryId, priority) → creates sub-issue with bug label
         - claimIssue(issueId, userId) → check assignee, assign if null, move to In Progress
         - releaseIssue(issueId) → clear assignee
         - updateStatus(issueId, status) → transition status
         - queryBoard(project, statuses) → list issues grouped by status
         - readIssue(issueId) → get full issue details

      2. Document assignment-based locking protocol:
         CLAIM: read → check assignee null → assign + In Progress
         RELEASE: clear assignee (status depends on outcome)

      3. Document branch naming: hom-{N}-{slug}
         Linear auto-links when branch contains HOM-{N}

      4. Document Linear status flow and mapping to Hive phases

      5. Document hierarchy: epic parent → story sub-issues → bug sub-issues

      6. Map each adapter operation to concrete linearis CLI command
    agent: developer

context:
  codebase: /Users/don/Documents/plugin-hive
  key_files:
    - skills/hive/references/task-tracking-adapter.md — file to rewrite

files_to_modify:
  - file: skills/hive/references/task-tracking-adapter.md
    change: Full rewrite — expand from human-intervention to full lifecycle

design_decisions:
  - decision: Locking is assignment-based, not label-based
    rationale: User preference. Uses Linear's native assignee field. Visible in board view. Simpler than labels.
  - decision: Branch naming uses hom-{N}-{slug} pattern
    rationale: Linear's native GitHub integration auto-links PRs when branch name contains the issue identifier (HOM-{N}).
  - decision: Epic parents are issues with epic-parent label, not Linear projects
    rationale: Projects are too coarse. Parent/sub-issue hierarchy gives per-story traceability within the plugin-hive project.

references:
  - skills/hive/references/task-tracking-adapter.md
