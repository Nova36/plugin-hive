id: update-orchestrator-agent
epic: hive-phase11
title: Add Linear integration to orchestrator agent persona
status: pending
complexity: low
depends_on: [linear-integration-reference, linear-commands-quickref]

description: |
  Add a Linear integration section to the orchestrator persona so it knows
  how to manage the board during its coordination role.

acceptance_criteria:
  - "Given the orchestrator reads its persona, then it knows to resolve user ID at session start"
  - "Given story assignment, then the orchestrator knows the branch naming convention"
  - "Given the system knowledge table, then it includes Linear-related paths and references"

steps:
  - id: update-persona
    description: |
      Update skills/hive/agents/orchestrator.md:
      1. Add "Linear board management" section covering:
         - Resolve user ID at session start (from config or linearis users list)
         - Read cycle state for Linear ticket IDs
         - Enforce branch naming: hom-{N}-{slug}
         - Reference linear-integration.md and linear-commands.md for operations
      2. Update system knowledge table with Linear paths
      3. Add linear-integration.md and linear-commands.md to reference docs list
    agent: developer

context:
  codebase: /Users/don/Documents/plugin-hive
  key_files:
    - skills/hive/agents/orchestrator.md — persona to update
    - skills/hive/references/linear-integration.md
    - skills/hive/references/linear-commands.md

files_to_modify:
  - file: skills/hive/agents/orchestrator.md
    change: Add Linear board management section and update references
