id: github-linear-setup-guide
epic: hive-phase11
title: Document GitHub-Linear native integration setup
status: pending
complexity: low
depends_on: [linear-board-setup]

description: |
  Document the manual steps to enable Linear's native GitHub integration.
  This enables auto-linking PRs to tickets via branch name and auto-closing
  tickets when PRs merge. This is a one-time setup per workspace.

acceptance_criteria:
  - "Given the setup guide, then it covers: connecting GitHub repo, enabling branch auto-link, enabling merge auto-close"
  - "Given the branch naming convention, then the guide explains how Linear detects HOM-{N} in branch names"
  - "Given the guide, then it's included in linear-integration.md (not a separate file)"

steps:
  - id: write-guide
    description: |
      Add a "GitHub Integration Setup" section to
      skills/hive/references/linear-integration.md (created by story 4)
      covering:

      1. In Linear: Settings → Integrations → GitHub → Connect
      2. Select the Nova36/plugin-hive repo (and any other repos)
      3. Enable "Auto-link PRs" — matches branch names containing HOM-{N}
      4. Enable "Auto-close issues" — when PR merges, linked issue moves to Done
      5. Verify: create a test branch hom-{N}-test, push, check Linear shows the link

      Note: this is a manual step. The guide is documentation, not automation.
    agent: developer

context:
  codebase: /Users/don/Documents/plugin-hive
  key_files:
    - skills/hive/references/linear-integration.md — doc to add section to

files_to_modify:
  - file: skills/hive/references/linear-integration.md
    change: Add GitHub Integration Setup section

references:
  - https://linear.app/docs/github — Linear's GitHub integration docs
