id: linear-board-setup
epic: hive-phase11
title: Verify Linear board configuration and create labels
status: pending
complexity: low
depends_on: []

description: |
  Verify the Linear board is configured correctly for Hive's workflow.
  Check that required statuses exist (Backlog, Todo, In Progress, In Review, Done),
  create labels that don't exist yet (human-intervention, bug, story, epic-parent),
  verify the plugin-hive project exists, and resolve the active user ID for
  assignment-based locking.

  This is a setup/verification story — mostly linearis CLI commands, not docs.

acceptance_criteria:
  - "Given the HOM team, when statuses are checked, then Backlog/Todo/In Progress/In Review/Done all exist"
  - "Given the label list, when checked, then human-intervention/bug/story/epic-parent labels exist"
  - "Given the plugin-hive project, when queried, then it exists and is linked to HOM team"
  - "Given linearis users list, then the active user ID is resolved and documented"

steps:
  - id: verify-and-setup
    description: |
      Run linearis CLI commands to verify and set up:
      1. `linearis teams list` — confirm HOM team
      2. `linearis projects list` — confirm plugin-hive project
      3. `linearis labels list --team HOM` — check existing labels
      4. Create missing labels via Linear UI (linearis CLI can't create labels)
      5. `linearis users list --active` — resolve user ID for assignment locking
      6. Document findings in a setup verification file
    agent: developer

context:
  codebase: /Users/don/Documents/plugin-hive
  key_files:
    - skills/hive/references/task-tracking-adapter.md — current adapter design
    - skills/hive/hive.config.yaml — config to update with user ID

files_to_modify:
  - file: skills/hive/hive.config.yaml
    change: Add linear_project and linear_user_id once resolved

design_decisions:
  - decision: Labels must be created via Linear UI since linearis CLI has no label create command
    rationale: linearis labels subcommand only supports list, not create. This is a one-time manual step.
  - decision: User ID is resolved once and stored in config
    rationale: Avoids querying linearis users list on every session start. Updated manually if user changes.

references:
  - skills/hive/references/task-tracking-adapter.md
