name: Agent or Skill Proposal
description: Propose a new agent, skill, workflow, or team config
labels: ["proposal", "extensibility", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose a new agent, skill, workflow, or team configuration. Before filing, read the [Extensibility section of the README](https://github.com/firefly-events/plugin-hive/blob/main/README.md#extensibility) — many extensions belong in your own project rather than in core Hive.

  - type: dropdown
    id: component-type
    attributes:
      label: Component type
      options:
        - Agent
        - Skill
        - Workflow
        - Team config
    validations:
      required: true

  - type: input
    id: proposed-name
    attributes:
      label: Proposed name
      description: Kebab-case name for the component (e.g., `security-auditor`, `fuzz-test`).
      placeholder: "my-component-name"
    validations:
      required: true

  - type: textarea
    id: purpose
    attributes:
      label: Purpose
      description: What does this component do? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: workflow-phase
    attributes:
      label: Which workflow phase does it extend?
      description: "e.g., planning, execution, testing, review — or describe where it fits in the Hive pipeline."
    validations:
      required: true

  - type: textarea
    id: core-vs-extension
    attributes:
      label: Why does this belong in core vs your own extension?
      description: Hive core is reserved for components that are broadly useful across project types. Make the case for why this should ship with Hive rather than live in a consuming project.
    validations:
      required: true

  - type: checkboxes
    id: collaboration
    attributes:
      label: Collaboration
      description: Checking this box signals interest — maintainers will follow up in this issue.
      options:
        - label: "I'd like to collaborate on building this"
