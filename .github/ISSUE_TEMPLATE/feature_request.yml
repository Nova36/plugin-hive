name: Feature Request
description: Suggest a new capability for Hive
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Hive uses an **issue-first model** — open this issue to start the conversation. If you'd like to implement the feature yourself, indicate that below and the maintainer will vet the approach before granting access.

        For agent, skill, workflow, or team proposals, please use the [Agent or Skill Proposal](?template=agent_skill_proposal.yml) template instead.

  - type: textarea
    id: problem-use-case
    attributes:
      label: Problem / use case
      description: What problem does this solve? What workflow does it improve?
      placeholder: "When I run /hive:execute, I can't..."
    validations:
      required: true

  - type: textarea
    id: proposed-approach
    attributes:
      label: Proposed approach
      description: How might this be implemented? Rough ideas are welcome.
    validations:
      required: false

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider or try?
    validations:
      required: false

  - type: checkboxes
    id: collaboration
    attributes:
      label: Collaboration
      description: Checking this box signals interest — maintainers will follow up in this issue.
      options:
        - label: "I'd like to collaborate on implementing this"
