name: Bug Report
description: Report a bug in Hive
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Before opening this issue, please review [CONTRIBUTING.md](https://github.com/firefly-events/plugin-hive/blob/main/CONTRIBUTING.md) — Hive uses an **issue-first, vetting-required** model. Maintainers triage and vet contributors before granting repo access.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Run /hive:kickoff
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: hive-version
    attributes:
      label: Hive version
      description: Found in `.claude-plugin/marketplace.json` or the version badge in README.
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      description: Run `claude --version` to find this.
      placeholder: "2.1.0"
    validations:
      required: true

  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows WSL
    validations:
      required: true

  - type: checkboxes
    id: collaboration
    attributes:
      label: Collaboration
      description: Checking this box signals interest — maintainers will follow up in this issue.
      options:
        - label: "I'd like to collaborate on fixing this"
