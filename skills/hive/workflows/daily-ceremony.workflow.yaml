name: daily-ceremony
description: Daily orchestrator ceremony — standup, planning, execution, testing, push.
version: "2.0.0"

# This workflow runs at session start with a fresh 1M Opus orchestrator.
# It is NOT a development workflow — it coordinates the day's work.
# Linear integration: see references/linear-integration.md and linear-commands.md

phases:
  - id: standup
    description: >
      Present the current state to the user. Read status markers, cycle state,
      task tracker, and agent memories to reconstruct context from previous sessions.

      Present:
      1. Previous session's completed work (from status markers in state/episodes/)
      2. In-progress items (stories with partial status markers)
      3. Blockers requiring human input (from task tracker via listPending())
      4. Recently resolved human items (newly unblocked work)
      5. Overnight improvements (any agent memory promotions or config changes)
      6. Continuation items (next stories in active epics)

      Linear operations:
      - Query board: linearis issues search "" --project "plugin-hive" --team HOM --limit 50
      - Surface blockers: filter for label:human-intervention + non-Done status
      - Compare board state against previous cycle state to detect changes
      - Present board view grouped by status (see references/linear-integration.md)

      Output: structured standup report with board view for user review.
    agent: orchestrator

  - id: planning
    description: >
      After standup, the user short-lists items for today's work. The orchestrator
      spins up a compressed planning session:

      1. User provides short list (story IDs, feature descriptions, or bug reports)
      2. Orchestrator evaluates: are these already planned as stories? Need new planning?
      3. If new work: run analyst + architect (+ ui-designer if UI work) as planning swarm
      4. Planning swarm reports back with proposed stories
      5. Run agent-ready checklist on proposed stories
      6. Present plan for user approval

      Linear operations (after approval):
      - Create epic parent if new epic: createEpicParent(title, description)
      - Create story sub-issues: createStoryIssue(title, description, epicIssueId) per story
      - Record all issue IDs in cycle state (linear.epic_issue_id, linear.stories.{id}.issue_id)
      - All stories start as status: Todo

      This is a compressed version of /hive:plan — the user provides direction,
      not a full brief.
    agent: orchestrator
    depends_on: [standup]

  - id: execution
    description: >
      After plan approval, kick off dev team(s) to execute the approved work.

      Current mode: one dev team at a time, epics in sequence.
      Future mode: parallel dev teams across independent epics.

      For each approved story:
      1. Load story spec and cycle state
      2. Evaluate: does this need a team or can the lead handle it solo?
      3. If team needed: spawn team lead → team lead staffs and executes
      4. If solo: execute directly
      5. Write status markers after each step
      6. Capture insights for session-end evaluation
      7. Update cycle state with decisions made

      Linear operations:
      - Claim ticket: claimIssue(issueId, userId) — check assignee, assign, In Progress
      - Create branch: git checkout -b hom-{N}-{slug} (enables GitHub auto-link)
      - Update cycle state: stories.{id}.status, assignee, branch
    agent: orchestrator
    depends_on: [planning]

  - id: commit
    description: >
      After dev execution completes, commit all changes before handing off to
      the test swarm. This creates a clean checkpoint — if tests find issues,
      fixes are committed separately so the git history shows the dev work
      and each subsequent fix as distinct commits.

      Commit message must reference the Linear ticket: "Refs: HOM-{N}"
      Linear detects this and links the commit to the issue.
    agent: orchestrator
    depends_on: [execution]

  - id: test-handoff
    description: >
      Create a cross-swarm handoff from the dev swarm to the test swarm.
      Package: story specs, implementation artifacts (committed file paths),
      cycle state, and acceptance criteria.

      Then run the test swarm pipeline (test-swarm.workflow.yaml):
      context → baseline → author tests → validate coverage →
      execute (parallel platforms) → file bugs → session report.

      High-severity bugs escalate to human via task tracker.
      Low-severity bugs auto-route to dev queue for fixing.

      Linear operations:
      - Move story to In Review: linearis issues update HOM-{N} --status "In Review"
      - Update cycle state: stories.{id}.status = "In Review"
    agent: orchestrator
    depends_on: [commit]

  - id: fix-loop
    description: >
      If the test swarm filed bugs that were auto-routed to the dev queue:
      1. Dev team picks up each bug
      2. Implements fix
      3. Commits the fix (separate commit per fix or grouped by story)
      4. Re-runs affected tests to verify

      Each fix gets its own commit so git history is traceable:
      - Commit 1: original dev work
      - Commit 2: fix for bug #1 (commit message: "fix: ... Fixes: HOM-{bug-N}")
      - Commit 3: fix for bug #2

      If all bugs are resolved, proceed to final review.
      If bugs remain unresolved, surface them for tomorrow's standup.

      Linear operations:
      - Create bug sub-issues: createBugIssue(title, desc, parentStoryId, priority)
      - Close fixed bugs: linearis issues update HOM-{bug-N} --status "Done"
      - Record bugs in cycle state: linear.bugs[]

      TERMINAL ISSUES: If a bug cannot be resolved by a development fix —
      architectural flaw, missing dependency, environment issue, broken
      third-party service, data corruption, or any issue requiring human
      judgment or access the agent doesn't have — then:
      1. STOP the fix loop immediately
      2. Mark the story as BLOCKED (not failed — it's waiting, not dead)
      3. Escalate in Linear: add human-intervention label, set priority 1,
         add comment with full context (what was tried, why it failed, what human needs to do)
      4. Notify the user directly (don't bury it in a report)
      5. Continue with any remaining non-blocked work
      6. The blocked item surfaces in tomorrow's standup as a blocker
    agent: orchestrator
    depends_on: [test-handoff]

  - id: final-review
    description: >
      After all tests pass and fixes are committed, run a final code review
      before pushing. This is the last quality gate before code leaves the
      machine. Use the code-review.workflow.yaml (analyze → review → summarize).

      The review sees the full picture: all dev work + all fixes, with passing
      tests as proof. The diff is everything committed since the session started.

      If the review returns needs_revision: route back to fix-loop.
      If the review returns passed or needs_optimization: proceed to push.

      No Linear operations — this is a code review gate only.
    agent: orchestrator
    depends_on: [fix-loop]

  - id: push
    description: >
      Push all committed work to the remote branch. This only happens after:
      1. Tests pass
      2. Final review passes
      3. No blocked stories remain

      If a PR is appropriate (feature branch), create one via gh CLI.
      If working on main, push directly (with user confirmation).

      Linear operations:
      - Push branch: git push -u origin hom-{N}-{slug}
      - Linear auto-links PR via branch name (native GitHub integration)
      - On merge: Linear auto-closes the linked issue → Done
      - No linearis command needed — GitHub native handles it
    agent: orchestrator
    depends_on: [final-review]

  - id: session-end
    description: >
      After all work is pushed:
      1. Evaluate staged insights — promote or discard per agent-memory-schema
      2. Update cycle state with the day's decisions
      3. Surface unresolved items for tomorrow's standup
      4. Clean up insight staging area

      Linear operations:
      - Release completed tickets: linearis issues update HOM-{N} --assignee ""
      - Check for anomalies: linearis issues search "" --project "plugin-hive" --team HOM --status "In Progress"
      - Leave blocked items assigned with human-intervention label (surfaces in next standup)
      - Update cycle state linear section with final statuses
    agent: orchestrator
    depends_on: [push]
